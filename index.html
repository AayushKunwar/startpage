<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            padding: 40px;
            background-image: 
                radial-gradient(circle at 20% 20%, #ff6b6b20 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #4ecdc420 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #ffe66d10 0%, transparent 50%);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 35px;
            color: #aaa;
            letter-spacing: 2px;
        }

        .columns {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .column {
            min-width: 160px;
        }

        .column h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: inline-block;
            padding: 0px 5px;
        }

        .column:nth-child(1) h2 { color: #ff6b6b; }
        .column:nth-child(2) h2 { color: #4ecdc4; }
        .column:nth-child(3) h2 { color: #ffe66d; }
        .column:nth-child(4) h2 { color: #a29bfe; }
        .column:nth-child(5) h2 { color: #fd7952; }
        .column:nth-child(6) h2 { color: #74b9ff; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        a {
            color: #ccc;
            text-decoration: none;
            padding: 6px;
            /*border-radius: 8px;*/
            display: block;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        a:hover {
            color: #fff;
            /*transform: translateX(5px);*/
        }

        .column:nth-child(1) a:hover { background: #ff6b6b30; }
        .column:nth-child(2) a:hover { background: #4ecdc430; }
        .column:nth-child(3) a:hover { background: #ffe66d30; }
        .column:nth-child(4) a:hover { background: #a29bfe30; }
        .column:nth-child(5) a:hover { background: #fd795230; }
        .column:nth-child(6) a:hover { background: #74b9ff30; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Links</h1>
        
        <div class="columns">
            <div class="column">
                <h2>Dev</h2>
                <div class="links">
                    <a href="https://localhost:9443/">Portainer</a>
                    <a href="http://localhost:2283/">Immich</a>
                    <a href="http://127.0.0.1:8188">Comfy UI</a>
                    <a href="https://www.github.com">GitHub</a>
                </div>
            </div>

            <div class="column">
                <h2>DevLoops</h2>
                <div class="links">
                    <a href="https://app.slack.com/client/TL2U73NBD">Slack</a>
                    <a href="https://onedrive.live.com/edit.aspx?resid=128A6C87FA850F2A!sdcc2aff5499e42ad8fda679a20c3c25d&cid=128a6c87fa850f2a&CT=1763094600248&OR=ItemsView">LoopsCart OneNote</a>
                    <a href="https://drive.google.com/drive/u/0/shared-with-me">Google Drive</a>
                    <a href="https://docs.google.com/spreadsheets/d/1Fp_IteWew9avC06co1eWY89oeQEU0shwq_Nad2tTmiQ/edit?pli=1&gid=288466577#gid=288466577">SprintPlan (old)</a>
                </div>
            </div>

            <div class="column">
                <h2>Piracy</h2>

                </div>
            </div>

            <div class="column">

                <div class="links">
                    <a href="https://gemini.google.com/app">Google Gemini</a>
                    <a href="https://chat.cerebras.ai/">Cerebras</a>

            <div class="column">

                <div class="links">

            <div class="column">

                    <a href="https://monkeytype.com/">MonkeyType</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
